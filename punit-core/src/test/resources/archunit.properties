# ArchUnit configuration for punit-core test sources.
#
# Enables the FreezingArchRule violation store so the cleanup-arc rules
# in PackageStructureArchitectureTest can capture the current set of
# violations and let new ones (regressions or partial cleanups) fail
# the build. Each cleanup commit shrinks the store; the cleanup is
# complete when every store file is empty.
#
# The store lives under archunit_store/ at the punit-core module root
# and is committed to source control alongside the rules.
freeze.store.default.allowStoreCreation=true
